<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nepal AI Legal Assistant</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h2>Chat History</h2>
      <ul id="history-list"></ul>
    </aside>

    <main id="chat-area">
      <h1>Nepal AI Legal Assistant</h1>
      <div id="chat-box">
        <div class="message bot">
          Hello! I'm Nepal AI Legal Assistant. How can I help you today?
        </div>
      </div>
      <div id="input-area">
        <input id="user-input" type="text" placeholder="Ask a legal question..." />
        <button id="send-btn">Send</button>
      </div>
    </main>
  </div>

  <script type="module" src="/src/script.js"></script>
</body>
</html>
